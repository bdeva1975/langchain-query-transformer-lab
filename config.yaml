# ─────────────────────────────────────────────────────
# LangChain Query Transformer Lab — Configuration
# ─────────────────────────────────────────────────────

llm:
  model: "gpt-4o-mini"
  temperature: 0
  max_tokens: 500

embeddings:
  model: "text-embedding-3-small"

data:
  input_dir: "data/"
  file_types:
    - ".pdf"
    - ".txt"

chroma:
  persist_dir: "chroma_db/"
  collection_name: "query_transformer_lab"

chunking:
  chunk_size: 1000
  chunk_overlap: 100

retrieval:
  top_k: 3

transformers:
  rewrite:
    enabled: true
    description: "Rewrites the query into a clearer, more precise form before retrieval"
  multi_query:
    enabled: true
    num_queries: 3
    description: "Generates multiple query variations to retrieve a broader set of chunks"
  step_back:
    enabled: true
    description: "Generates a higher-level abstract question to retrieve broader context"
  hyde:
    enabled: true
    description: "Generates a hypothetical answer and uses it as the retrieval query"